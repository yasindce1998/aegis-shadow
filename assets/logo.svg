<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#bf5fff"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="120" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="300" y="62" font-family="'Courier New', monospace" font-size="42" font-weight="bold"
        text-anchor="middle" fill="url(#titleGrad)" filter="url(#glow)">AEGIS-SHADOW</text>

  <!-- Subtitle -->
  <text x="300" y="90" font-family="'Courier New', monospace" font-size="11"
        text-anchor="middle" fill="#484f58" letter-spacing="2.5">eBPF SECURITY RESEARCH</text>
</svg>
