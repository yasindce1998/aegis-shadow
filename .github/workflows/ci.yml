name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check-common:
    name: Check common & xtask
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --package common --package xtask
      - run: cargo clippy --package common --package xtask -- -D warnings

  build-ebpf:
    name: Build eBPF programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: ebpf
      - name: Build offense-ebpf
        run: |
          cargo +nightly build --package offense-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      - name: Build defense-ebpf
        run: |
          cargo +nightly build --package defense-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      - name: Upload eBPF binaries
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-binaries
          path: |
            target/bpfel-unknown-none/release/offense
            target/bpfel-unknown-none/release/defense
          retention-days: 1

  build-userspace:
    name: Build user-space crates
    runs-on: ubuntu-latest
    needs: build-ebpf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Download eBPF binaries
        uses: actions/download-artifact@v4
        with:
          name: ebpf-binaries
          path: target/bpfel-unknown-none/release
      - name: Create debug symlinks
        run: |
          mkdir -p target/bpfel-unknown-none/debug
          cp target/bpfel-unknown-none/release/offense target/bpfel-unknown-none/debug/offense
          cp target/bpfel-unknown-none/release/defense target/bpfel-unknown-none/debug/defense
      - name: Build offense
        run: cargo build --package offense
      - name: Build defense
        run: cargo build --package defense
      - name: Clippy
        run: cargo clippy --package offense --package defense -- -D warnings

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
