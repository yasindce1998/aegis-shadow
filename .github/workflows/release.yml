name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ebpf:
    name: Build eBPF programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: ebpf-release
      - name: Install bpf-linker
        run: cargo install bpf-linker
      - name: Build offense-ebpf
        run: |
          cargo +nightly build --package offense-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      - name: Build defense-ebpf
        run: |
          cargo +nightly build --package defense-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
      - name: Upload eBPF binaries
        uses: actions/upload-artifact@v7
        with:
          name: ebpf-binaries
          path: |
            target/bpfel-unknown-none/release/offense
            target/bpfel-unknown-none/release/defense
          retention-days: 1

  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: build-ebpf
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.arch }}
      - name: Install cross-compilation tools
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Download eBPF binaries
        uses: actions/download-artifact@v8
        with:
          name: ebpf-binaries
          path: target/bpfel-unknown-none/release
      - name: Create debug symlinks
        run: |
          mkdir -p target/bpfel-unknown-none/debug
          cp target/bpfel-unknown-none/release/offense target/bpfel-unknown-none/debug/offense
          cp target/bpfel-unknown-none/release/defense target/bpfel-unknown-none/debug/defense
      - name: Build offense (shadow)
        run: cargo build --package offense --features ebpf-bin --release --target ${{ matrix.target }}
      - name: Build defense (aegis)
        run: cargo build --package defense --features ebpf-bin --release --target ${{ matrix.target }}
      - name: Rename binaries
        run: |
          cp target/${{ matrix.target }}/release/offense shadow_${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/defense aegis_${{ matrix.arch }}
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: |
            shadow_${{ matrix.arch }}
            aegis_${{ matrix.arch }}
          retention-days: 1

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v6
      - name: Download x86_64 binaries
        uses: actions/download-artifact@v8
        with:
          name: release-x86_64
          path: artifacts
      - name: Download aarch64 binaries
        uses: actions/download-artifact@v8
        with:
          name: release-aarch64
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/shadow_x86_64
            artifacts/aegis_x86_64
            artifacts/shadow_aarch64
            artifacts/aegis_aarch64
